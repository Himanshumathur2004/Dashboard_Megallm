version: '3.8'

services:
  unified-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unified-dashboard
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - BLOG_DASHBOARD_URL=http://localhost:5000
      - COMMENT_DASHBOARD_URL=http://localhost:3500
      # Pass through environment variables from .env file
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB=${MONGODB_DB:-megallm_blog_platform}
      - MEGALLM_API_KEY=${MEGALLM_API_KEY}
      - MEGALLM_BASE_URL=${MEGALLM_BASE_URL:-https://beta.megallm.io/v1}
      - MODEL=${MODEL:-claude-opus-4-6}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s